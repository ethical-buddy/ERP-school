version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: erp_school
      POSTGRES_USER: erp_school
      POSTGRES_PASSWORD: erp_school
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp_school -d erp_school"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
